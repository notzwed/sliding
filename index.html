<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#020202">
  <meta name="application-name" content="Slidey">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Slidey">
  <title>Slidey</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="64x64" href="./icons/favicon-64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <div class="hud">
      <div class="hud-block">
        <span class="hud-label">Level</span>
        <strong id="levelValue">01</strong>
      </div>
      <div class="hud-block hud-center">
        <span class="hud-label">Collapse</span>
        <div class="danger-track">
          <div id="dangerFill" class="danger-fill"></div>
        </div>
      </div>
      <div class="hud-block hud-right">
        <span class="hud-label">Orbs</span>
        <strong id="orbValue">00 / 00</strong>
      </div>
    </div>

    <main class="game-stage">
      <canvas id="gameCanvas" aria-label="Slidey maze game"></canvas>

      <div id="messagePanel" class="message-panel hidden">
        <p id="messageTitle" class="message-title"></p>
        <p id="messageText" class="message-text"></p>
      </div>
    </main>

    <div class="footer-bar">
      <div class="footer-item">
        <span class="hud-label">Wallet</span>
        <strong id="runValue">00</strong>
      </div>
      <p id="statusText" class="status-text">Swipe or use WASD / arrow keys. Collect as many orbs as possible and escape through the exit.</p>
    </div>

    <div class="account-bar" aria-live="polite">
      <span id="accountState" class="account-state">Guest mode</span>
      <input id="accountEmail" class="account-input" type="email" placeholder="email" autocomplete="email">
      <input id="accountPassword" class="account-input" type="password" placeholder="password" autocomplete="current-password">
      <button id="registerAction" class="account-action" type="button">Register +2000</button>
      <button id="loginAction" class="account-action" type="button">Login</button>
      <button id="logoutAction" class="account-action" type="button">Logout</button>
    </div>
  </div>

  <div id="installGate" class="install-gate hidden" aria-hidden="true">
    <button id="installAction" class="install-action" type="button">Add Slidey to Home Screen to Play</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.config.js"></script>
  <script src="./game.js"></script>
  <script src="./app.js"></script>
</body>
</html>
